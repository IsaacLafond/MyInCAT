name: Docker Image CI

on:
  push:
    branches: [ "main", "testing" ]

env:
  REGISTRY: ghcr.io

jobs:

  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    # 1: Login to GHCR
    - name: Log in to the Container registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    # 2: Set up Docker Buildx (Required for advanced caching)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    # 3: Build/push
    - name: Build and push Docker images
      uses: docker/build-push-action@v7
      with:
        # List of external cache sources for buildx (e.g., user/app:cache, type=local,src=path/to/dir)
        cache-from: type=gha
        # List of cache export destinations for buildx (e.g., user/app:cache, type=local,dest=path/to/dir)
        cache-to: type=gha,mode=max
        # Build's context is the set of files located in the specified PATH or URL
        context: .
        # Path to the Dockerfile
        file: ./Dockerfile.prod
        # Push is a shorthand for --output=type=registry
        push: true
        # List of tags
        tags: |
          ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.ref == 'refs/heads/main' && 'latest' || 'testing' }}
